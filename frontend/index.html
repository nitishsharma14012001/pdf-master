<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ──────────────────────────────────────────────────── -->
    <title>PDF Master — Free Online PDF & Image Tools | Merge, Compress, Convert</title>
    <meta
      name="description"
      content="PDF Master is your all-in-one free online toolkit. Merge, split, compress, rotate, protect and convert PDFs and images securely in your browser — fast, no signup required."
    />
    <meta
      name="keywords"
      content="PDF tools, merge PDF, split PDF, compress PDF, rotate PDF, protect PDF, unlock PDF, JPG to PDF, PNG to PDF, image converter, resize image, compress image, free PDF editor online"
    />
    <meta name="author" content="PDF Master" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://pdfmaster.app/" />

    <!-- Language alternates (single-locale today; ready to extend) -->
    <link rel="alternate" hreflang="en" href="https://pdfmaster.app/" />
    <link rel="alternate" hreflang="x-default" href="https://pdfmaster.app/" />

    <!-- ── Favicon package ──────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- ── Theme / PWA ──────────────────────────────────────────────────── -->
    <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PDF Master" />
    <meta name="application-name" content="PDF Master" />
    <meta name="format-detection" content="telephone=no" />

    <!-- ── Open Graph ───────────────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pdfmaster.app/" />
    <meta property="og:site_name" content="PDF Master" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:title" content="PDF Master — Free Online PDF & Image Tools" />
    <meta
      property="og:description"
      content="Merge, split, compress, rotate, protect and convert PDFs and images — fast, secure, and no signup required."
    />
    <meta property="og:image" content="https://pdfmaster.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="PDF Master — Every PDF & Image Tool You Need" />

    <!-- ── Twitter Card ─────────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@pdfmaster" />
    <meta name="twitter:title" content="PDF Master — Free Online PDF & Image Tools" />
    <meta
      name="twitter:description"
      content="Merge, split, compress, rotate, protect and convert PDFs and images — fast, secure, and no signup required."
    />
    <meta name="twitter:image" content="https://pdfmaster.app/og-image.png" />
    <meta name="twitter:image:alt" content="PDF Master — Every PDF & Image Tool You Need" />

    <!-- ── Connection / resource optimization ───────────────────────────── -->
    <!-- Google Fonts: connect early, and preload the stylesheet itself so
         the browser doesn't wait for the render-blocking discovery step. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <!-- API origin: same-origin in dev (proxied by Vite) and in most
         production deployments behind one domain. If the API is ever
         split onto its own subdomain, uncomment and point this at it so
         the very first upload request skips a fresh DNS+TLS handshake:
         <link rel="preconnect" href="https://api.pdfmaster.app" /> -->

    <!-- ── Structured data (JSON-LD) ────────────────────────────────────── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "PDF Master",
        "url": "https://pdfmaster.app/",
        "description": "Free online toolkit for merging, splitting, compressing, rotating, protecting, and converting PDFs and images directly in the browser.",
        "applicationCategory": "Utility",
        "applicationSubCategory": "DocumentEditor",
        "operatingSystem": "Any (web-based)",
        "browserRequirements": "Requires a modern web browser with JavaScript enabled",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD",
          "category": "Free"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
