<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ═══════════════════════════════════════════════════════════
         PRIMARY META
    ═══════════════════════════════════════════════════════════ -->
    <title>PDF Master — Free PDF &amp; Image Tools Online</title>
    <meta
      name="description"
      content="Merge, split, compress, convert and edit PDFs and images instantly — free, secure, and no sign-up required. 20+ professional tools that run in your browser."
    />
    <meta name="author" content="PDF Master" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a"  media="(prefers-color-scheme: dark)" />

    <!-- ═══════════════════════════════════════════════════════════
         GOOGLE SEARCH CONSOLE VERIFICATION
         Replace the content value with the one Google gives you
         during Search Console property setup → HTML tag method.
         Do not change the name attribute.
    ═══════════════════════════════════════════════════════════ -->
    <!-- <meta name="google-site-verification" content="REPLACE_WITH_YOUR_GSC_VERIFICATION_CODE" /> -->

    <!-- ═══════════════════════════════════════════════════════════
         MICROSOFT CLARITY
         Clarity is lazy-loaded by src/analytics/index.js ONLY after
         the user accepts cookies — do NOT add the Clarity snippet
         here, as that would bypass consent.

         To enable Clarity:
           1. Create a project at https://clarity.microsoft.com
           2. Copy your 10-character Project ID
           3. Add it to .env:  VITE_CLARITY_PROJECT_ID=your_id
         That's all — the React app handles the rest.
    ═══════════════════════════════════════════════════════════ -->

    <!-- ═══════════════════════════════════════════════════════════
         GOOGLE ANALYTICS 4
         GA4 is also lazy-loaded post-consent via react-ga4.
         Do NOT add gtag.js here. Set VITE_GA4_MEASUREMENT_ID in .env.
    ═══════════════════════════════════════════════════════════ -->

    <!-- ═══════════════════════════════════════════════════════════
         CANONICAL
    ═══════════════════════════════════════════════════════════ -->
    <link rel="canonical" href="https://thepdfmaster.in/" />

    <!-- ═══════════════════════════════════════════════════════════
         OPEN GRAPH
    ═══════════════════════════════════════════════════════════ -->
    <meta property="og:type"         content="website" />
    <meta property="og:url"          content="https://thepdfmaster.in/" />
    <meta property="og:site_name"    content="PDF Master" />
    <meta property="og:title"        content="PDF Master — Free PDF &amp; Image Tools Online" />
    <meta property="og:description"  content="Merge, split, compress, convert and edit PDFs and images instantly — free, secure, and no sign-up required." />
    <meta property="og:image"        content="https://thepdfmaster.in/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"    content="PDF Master — Free PDF and image tools" />
    <meta property="og:locale"       content="en_US" />

    <!-- ═══════════════════════════════════════════════════════════
         TWITTER CARD
    ═══════════════════════════════════════════════════════════ -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@pdfmaster" />
    <meta name="twitter:title"       content="PDF Master — Free PDF &amp; Image Tools Online" />
    <meta name="twitter:description" content="Merge, split, compress, convert and edit PDFs and images instantly — free, secure, and no sign-up required." />
    <meta name="twitter:image"       content="https://thepdfmaster.in/og-image.png" />
    <meta name="twitter:image:alt"   content="PDF Master — Free PDF and image tools" />

    <!-- ═══════════════════════════════════════════════════════════
         FAVICONS & MANIFEST
    ═══════════════════════════════════════════════════════════ -->
    <link rel="icon"             href="/favicon.ico" sizes="any" />
    <link rel="icon"             href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest"         href="/manifest.webmanifest" />

    <!-- ═══════════════════════════════════════════════════════════
         PRECONNECT
    ═══════════════════════════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.thepdfmaster.in" />

    <!-- ═══════════════════════════════════════════════════════════
         FONTS (non-blocking)
    ═══════════════════════════════════════════════════════════ -->
    <link
      rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800;900&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800;900&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800;900&display=swap"
      />
    </noscript>

    <!-- ═══════════════════════════════════════════════════════════
         JSON-LD — SoftwareApplication (site-level)
         Per-tool schemas are injected dynamically by useSEO hook
    ═══════════════════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "PDF Master",
      "url": "https://thepdfmaster.in",
      "description": "Free online PDF and image tools. Merge, split, compress, convert and edit PDFs and images instantly — no sign-up required.",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Web",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "14203",
        "bestRating": "5",
        "worstRating": "1"
      },
      "author": {
        "@type": "Organization",
        "name": "PDF Master",
        "url": "https://thepdfmaster.in",
        "logo": { "@type": "ImageObject", "url": "https://thepdfmaster.in/icons/android-chrome-512x512.png" }
      }
    }
    </script>

    <!-- ═══════════════════════════════════════════════════════════
         CRITICAL CSS — prevents flash of unstyled content
    ═══════════════════════════════════════════════════════════ -->
    <style>
      :root { --bg: #ffffff; --text: #0f172a; }
      @media (prefers-color-scheme: dark) { :root { --bg: #0f172a; --text: #f1f5f9; } }
      html { background: var(--bg); color: var(--text); }
      body { margin: 0; font-family: Inter, system-ui, sans-serif; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
